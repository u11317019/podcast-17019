<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast 播放器</title>
    <style>
        :root { --primary: #007AFF; --bg: #f5f5f7; }
        body { background: var(--bg); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        canvas { width: 100%; height: 80px; background: #eee; border-radius: 10px; margin-bottom: 15px; }
        .prog { width: 100%; margin: 15px 0; accent-color: var(--primary); }
        .time { display: flex; justify-content: space-between; font-size: 12px; color: #888; }
        .btns { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        button { border: none; background: #e5e5ea; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .play { background: var(--primary); color: #fff; width: 80px; }
        /* 將 vol 類別改為通用的控制條樣式 */
        .slider-ctrl { display: flex; align-items: center; justify-content: space-between; font-size: 12px; margin-bottom: 10px; }
        .slider-ctrl input { flex: 1; margin-left: 10px; accent-color: var(--primary); }
        .slider-ctrl span { width: 60px; text-align: left; }
        .hint { font-size: 11px; color: #aaa; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h3>Podcast 播放器</h3>
    <canvas id="canvas"></canvas>
    
    <audio id="audio" src="podcast.mp3"></audio>

    <div class="time-box">
        <input type="range" id="prog" class="prog" value="0">
        <div class="time">
            <span id="cur">0:00</span>
            <span id="dur">0:00</span>
        </div>
    </div>

    <div class="btns">
        <button id="back">-10s</button>
        <button id="play" class="play">播放</button>
        <button id="next">+10s</button>
    </div>

    <div class="slider-ctrl">
        <span>音量</span>
        <input type="range" id="v-slid" min="0" max="1" step="0.1" value="0.7">
    </div>

    <div class="slider-ctrl">
        <span>速度 <strong id="speed-val">1.0</strong>x</span>
        <input type="range" id="s-slid" min="0.33" max="3" step="0.01" value="1">
    </div>

    <div class="hint">快捷鍵：空白鍵(暫停/播放) <br> 左右鍵(快進退) / 上下鍵(調速)</div>
</div>

<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play');
    const prog = document.getElementById('prog');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // 新增的速度控制元素
    const sSlid = document.getElementById('s-slid');
    const speedVal = document.getElementById('speed-val');
    const vSlid = document.getElementById('v-slid');

    let aCtx, analyser, srcNode;

    // 播放/暫停功能
    function toggle() {
        if (audio.paused) {
            if (!aCtx) initVisualizer();
            audio.play().catch(err => {
                alert("播放失敗！請檢查資料夾中是否有 podcast.mp3 檔案。");
                console.error(err);
            });
            playBtn.innerText = "暫停";
        } else {
            audio.pause();
            playBtn.innerText = "播放";
        }
    }

    // 初始化等化器
    function initVisualizer() {
        aCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = aCtx.createAnalyser();
        srcNode = aCtx.createMediaElementSource(audio);
        srcNode.connect(analyser);
        analyser.connect(aCtx.destination);
        draw();
    }

    // 繪製動畫
    function draw() {
        const data = new Uint8Array(analyser.frequencyBinCount);
        function frame() {
            requestAnimationFrame(frame);
            analyser.getByteFrequencyData(data);
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#007AFF';
            data.slice(0, 30).forEach((v, i) => {
                ctx.fillRect(i * 10, canvas.height - v/3, 7, v/3);
            });
        }
        frame();
    }

    // 更新速度顯示與音檔屬性的函式
    function updateSpeed(newSpeed) {
        // 確保速度在 0.33 到 3 之間
        newSpeed = Math.max(0.33, Math.min(3, newSpeed));
        audio.playbackRate = newSpeed;
        sSlid.value = newSpeed;
        speedVal.innerText = newSpeed.toFixed(1);
    }

    // 鍵盤事件
    window.onkeydown = (e) => {
        // 防止空白鍵跟上下鍵觸發網頁預設的捲動行為
        if (['Space', 'ArrowUp', 'ArrowDown'].includes(e.code)) {
            e.preventDefault(); 
        }

        if (e.code === 'Space') toggle();
        if (e.code === 'ArrowRight') audio.currentTime += 10;
        if (e.code === 'ArrowLeft') audio.currentTime -= 10;
        
        // 上下鍵調整速度 (每次加減 0.1)
        if (e.code === 'ArrowUp') {
            updateSpeed(audio.playbackRate + 0.1);
        }
        if (e.code === 'ArrowDown') {
            updateSpeed(audio.playbackRate - 0.1);
        }
    };

    // 其他控制
    playBtn.onclick = toggle;
    document.getElementById('next').onclick = () => audio.currentTime += 10;
    document.getElementById('back').onclick = () => audio.currentTime -= 10;
    
    // 音量與速度拖曳事件
    vSlid.oninput = (e) => audio.volume = e.target.value;
    sSlid.oninput = (e) => updateSpeed(parseFloat(e.target.value));

    // 進度條與時間
    audio.ontimeupdate = () => {
        prog.value = (audio.currentTime / audio.duration) * 100 || 0;
        document.getElementById('cur').innerText = fmt(audio.currentTime);
    };
    audio.onloadedmetadata = () => {
        document.getElementById('dur').innerText = fmt(audio.duration);
        audio.volume = vSlid.value; // 確保初始音量與拉桿一致
    };
    prog.oninput = (e) => audio.currentTime = (e.target.value / 100) * audio.duration;

    function fmt(s) {
        if (isNaN(s)) return "0:00";
        const m = Math.floor(s/60);
        const sec = Math.floor(s%60);
        return `${m}:${sec < 10 ? '0'+sec : sec}`;
    }

    // 偵測檔案載入錯誤
    audio.onerror = () => {
        alert("找不到音檔！請確認檔名是否為 podcast.mp3 (注意大小寫)。");
    };
</script>
</body>
</html>
